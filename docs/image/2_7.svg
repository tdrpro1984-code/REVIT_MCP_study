<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <rect width="800" height="800" fill="#000"/>

  <!-- LEFT: BEFORE -->
  <text x="200" y="100" fill="rgba(255,255,255,0.4)" font-family="Helvetica Neue,sans-serif" font-size="14" letter-spacing="4" text-anchor="middle">BEFORE</text>

  <!-- Big fat CLAUDE.md block -->
  <rect x="80" y="140" width="240" height="320" rx="8" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
  <text x="200" y="170" fill="rgba(255,255,255,0.5)" font-family="Helvetica Neue,sans-serif" font-size="13" text-anchor="middle">CLAUDE.md</text>
  <!-- Dense lines representing all content -->
  <line x1="100" y1="195" x2="300" y2="195" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <line x1="100" y1="210" x2="280" y2="210" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <line x1="100" y1="225" x2="290" y2="225" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <line x1="100" y1="240" x2="270" y2="240" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <line x1="100" y1="255" x2="300" y2="255" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <line x1="100" y1="270" x2="260" y2="270" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <line x1="100" y1="285" x2="295" y2="285" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <line x1="100" y1="300" x2="280" y2="300" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <line x1="100" y1="315" x2="290" y2="315" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <line x1="100" y1="330" x2="275" y2="330" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <line x1="100" y1="345" x2="300" y2="345" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <line x1="100" y1="360" x2="265" y2="360" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <line x1="100" y1="375" x2="290" y2="375" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <line x1="100" y1="390" x2="280" y2="390" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <line x1="100" y1="405" x2="300" y2="405" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <line x1="100" y1="420" x2="270" y2="420" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <line x1="100" y1="435" x2="295" y2="435" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <!-- Warning icon -->
  <circle cx="200" cy="510" r="20" fill="none" stroke="#e06060" stroke-width="2"/>
  <text x="200" y="518" fill="#e06060" font-family="Helvetica Neue,sans-serif" font-size="22" font-weight="800" text-anchor="middle">!</text>
  <!-- Token count -->
  <text x="200" y="570" fill="#fff" font-family="Helvetica Neue,sans-serif" font-size="48" font-weight="800" text-anchor="middle">~9,800</text>
  <text x="200" y="600" fill="rgba(255,255,255,0.4)" font-family="Helvetica Neue,sans-serif" font-size="14" text-anchor="middle">tokens at startup</text>

  <!-- Dividing line -->
  <line x1="400" y1="100" x2="400" y2="680" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>

  <!-- RIGHT: AFTER -->
  <text x="600" y="100" fill="rgba(255,255,255,0.4)" font-family="Helvetica Neue,sans-serif" font-size="14" letter-spacing="4" text-anchor="middle">AFTER</text>

  <!-- Small CLAUDE.md block (just index) -->
  <rect x="520" y="140" width="160" height="100" rx="8" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
  <text x="600" y="170" fill="rgba(255,255,255,0.5)" font-family="Helvetica Neue,sans-serif" font-size="13" text-anchor="middle">CLAUDE.md</text>
  <line x1="540" y1="190" x2="660" y2="190" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <line x1="540" y1="205" x2="640" y2="205" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <line x1="540" y1="220" x2="650" y2="220" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <text x="600" y="232" fill="rgba(255,255,255,0.25)" font-family="Helvetica Neue,sans-serif" font-size="10" text-anchor="middle">index only</text>

  <!-- Ghost skill boxes (not loaded) -->
  <rect x="520" y="275" width="160" height="40" rx="6" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="600" y="300" fill="rgba(255,255,255,0.25)" font-family="Helvetica Neue,sans-serif" font-size="12" text-anchor="middle">&#x25CB;fire-safety</text>

  <rect x="520" y="325" width="160" height="40" rx="6" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="600" y="350" fill="rgba(255,255,255,0.25)" font-family="Helvetica Neue,sans-serif" font-size="12" text-anchor="middle">&#x25CB;parking-check</text>

  <rect x="520" y="375" width="160" height="40" rx="6" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="600" y="400" fill="rgba(255,255,255,0.25)" font-family="Helvetica Neue,sans-serif" font-size="12" text-anchor="middle">&#x25CB;smoke-exhaust</text>

  <text x="600" y="445" fill="rgba(255,255,255,0.2)" font-family="Helvetica Neue,sans-serif" font-size="11" text-anchor="middle">loaded only when triggered</text>

  <!-- Check icon -->
  <circle cx="600" cy="510" r="20" fill="none" stroke="#60c080" stroke-width="2"/>
  <text x="600" y="518" fill="#60c080" font-family="Helvetica Neue,sans-serif" font-size="22" text-anchor="middle">✓</text>
  <!-- Token count -->
  <text x="600" y="570" fill="#fff" font-family="Helvetica Neue,sans-serif" font-size="48" font-weight="800" text-anchor="middle">~3,500</text>
  <text x="600" y="600" fill="rgba(255,255,255,0.4)" font-family="Helvetica Neue,sans-serif" font-size="14" text-anchor="middle">tokens at startup</text>

  <!-- Bottom: reduction -->
  <text x="400" y="690" fill="#fff" font-family="Helvetica Neue,sans-serif" font-size="56" font-weight="800" text-anchor="middle">−64%</text>
  <text x="400" y="730" fill="rgba(255,255,255,0.3)" font-family="Helvetica Neue,sans-serif" font-size="13" text-anchor="middle">community benchmark: up to −87% (Seroter, 2026)</text>
</svg>
