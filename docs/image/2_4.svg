<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <rect width="800" height="800" fill="#000"/>
  <!-- Top axis: MCP = DO -->
  <line x1="120" y1="260" x2="680" y2="260" stroke="#fff" stroke-width="2"/>
  <!-- Wrench icon -->
  <circle cx="120" cy="260" r="18" fill="none" stroke="#fff" stroke-width="2"/>
  <polygon points="112,254 130,260 120,272 112,266" fill="#fff"/>
  <text x="680" y="250" fill="#fff" font-family="Helvetica Neue,sans-serif" font-size="28" font-weight="800" text-anchor="end">DO</text>
  <text x="400" y="300" fill="rgba(255,255,255,0.5)" font-family="Helvetica Neue,sans-serif" font-size="18" text-anchor="middle">MCP — ABILITY</text>
  <text x="400" y="328" fill="rgba(255,255,255,0.3)" font-family="Helvetica Neue,sans-serif" font-size="14" text-anchor="middle">58 tools always available</text>

  <!-- Big ≠ in the middle -->
  <text x="400" y="420" fill="#fff" font-family="Helvetica Neue,sans-serif" font-size="96" font-weight="800" text-anchor="middle">≠</text>

  <!-- Bottom axis: SKILL = KNOW -->
  <line x1="120" y1="540" x2="680" y2="540" stroke="#fff" stroke-width="2"/>
  <!-- Book icon -->
  <circle cx="120" cy="540" r="18" fill="none" stroke="#fff" stroke-width="2"/>
  <rect x="112" y="530" width="16" height="20" rx="2" fill="none" stroke="#fff" stroke-width="1.5"/><rect x="120" y="530" width="16" height="20" rx="2" fill="none" stroke="#fff" stroke-width="1.5"/>
  <text x="680" y="530" fill="#fff" font-family="Helvetica Neue,sans-serif" font-size="28" font-weight="800" text-anchor="end">KNOW</text>
  <text x="400" y="580" fill="rgba(255,255,255,0.5)" font-family="Helvetica Neue,sans-serif" font-size="18" text-anchor="middle">SKILL — KNOWLEDGE</text>
  <text x="400" y="608" fill="rgba(255,255,255,0.3)" font-family="Helvetica Neue,sans-serif" font-size="14" text-anchor="middle">17 workflows loaded on demand</text>

  <!-- Bottom quote -->
  <text x="400" y="720" fill="rgba(255,255,255,0.35)" font-family="Helvetica Neue,sans-serif" font-size="14" text-anchor="middle" font-style="italic">"Saying Skills killed MCP is like saying recipes killed kitchens."</text>
</svg>
