<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <rect width="800" height="800" fill="#000"/>

  <!-- Title -->
  <text x="400" y="70" fill="rgba(255,255,255,0.4)" font-family="Helvetica Neue,sans-serif" font-size="14" letter-spacing="4" text-anchor="middle">SHARED KNOWLEDGE</text>

  <!-- Left side: Anthropic model (1:1) -->
  <text x="200" y="130" fill="rgba(255,255,255,0.35)" font-family="Helvetica Neue,sans-serif" font-size="12" text-anchor="middle">ANTHROPIC MODEL</text>

  <!-- Skill A with internal ref -->
  <rect x="80" y="160" width="110" height="80" rx="6" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
  <text x="135" y="185" fill="rgba(255,255,255,0.5)" font-family="Helvetica Neue,sans-serif" font-size="11" text-anchor="middle">Skill A</text>
  <rect x="95" y="200" width="80" height="25" rx="3" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <text x="135" y="217" fill="rgba(255,255,255,0.4)" font-family="Helvetica Neue,sans-serif" font-size="9" text-anchor="middle">refs/knowledge</text>

  <!-- Skill B with SAME internal ref (duplicated) -->
  <rect x="210" y="160" width="110" height="80" rx="6" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
  <text x="265" y="185" fill="rgba(255,255,255,0.5)" font-family="Helvetica Neue,sans-serif" font-size="11" text-anchor="middle">Skill B</text>
  <rect x="225" y="200" width="80" height="25" rx="3" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <text x="265" y="217" fill="rgba(255,255,255,0.4)" font-family="Helvetica Neue,sans-serif" font-size="9" text-anchor="middle">refs/knowledge</text>

  <!-- Duplication indicator -->
  <text x="200" y="270" fill="rgba(255,255,255,0.3)" font-family="Helvetica Neue,sans-serif" font-size="11" text-anchor="middle">same knowledge, duplicated</text>

  <!-- Dividing line -->
  <line x1="400" y1="120" x2="400" y2="700" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>

  <!-- Right side: Our model (N:N) -->
  <text x="600" y="130" fill="rgba(255,255,255,0.35)" font-family="Helvetica Neue,sans-serif" font-size="12" text-anchor="middle">BIM MODEL</text>

  <!-- Skill A -->
  <rect x="490" y="160" width="100" height="45" rx="6" fill="none" stroke="#fff" stroke-width="1.5"/>
  <text x="540" y="188" fill="#fff" font-family="Helvetica Neue,sans-serif" font-size="11" text-anchor="middle">fire-safety</text>

  <!-- Skill B -->
  <rect x="610" y="160" width="100" height="45" rx="6" fill="none" stroke="#fff" stroke-width="1.5"/>
  <text x="660" y="188" fill="#fff" font-family="Helvetica Neue,sans-serif" font-size="11" text-anchor="middle">compliance</text>

  <!-- Skill C -->
  <rect x="550" y="220" width="100" height="45" rx="6" fill="none" stroke="#fff" stroke-width="1.5"/>
  <text x="600" y="248" fill="#fff" font-family="Helvetica Neue,sans-serif" font-size="11" text-anchor="middle">corridor</text>

  <!-- Shared domain (center, prominent) -->
  <rect x="530" y="310" width="140" height="50" rx="8" fill="rgba(255,255,255,0.1)" stroke="#fff" stroke-width="2"/>
  <text x="600" y="330" fill="#fff" font-family="Helvetica Neue,sans-serif" font-size="12" font-weight="700" text-anchor="middle">domain/</text>
  <text x="600" y="348" fill="rgba(255,255,255,0.5)" font-family="Helvetica Neue,sans-serif" font-size="10" text-anchor="middle">fire-rating-check.md</text>

  <!-- Lines from skills to domain -->
  <line x1="540" y1="205" x2="570" y2="310" stroke="rgba(255,255,255,0.4)" stroke-width="1"/>
  <line x1="660" y1="205" x2="630" y2="310" stroke="rgba(255,255,255,0.4)" stroke-width="1"/>
  <line x1="600" y1="265" x2="600" y2="310" stroke="rgba(255,255,255,0.4)" stroke-width="1"/>

  <!-- "shared, not duplicated" -->
  <text x="600" y="390" fill="rgba(255,255,255,0.3)" font-family="Helvetica Neue,sans-serif" font-size="11" text-anchor="middle">one source, three consumers</text>

  <!-- Bottom: The principle -->
  <rect x="100" y="440" width="600" height="120" rx="10" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>

  <text x="400" y="475" fill="rgba(255,255,255,0.5)" font-family="Helvetica Neue,sans-serif" font-size="13" text-anchor="middle">Anthropic assumes each Skill's knowledge is independent.</text>
  <text x="400" y="500" fill="rgba(255,255,255,0.5)" font-family="Helvetica Neue,sans-serif" font-size="13" text-anchor="middle">BIM workflows share regulatory knowledge across Skills.</text>
  <text x="400" y="535" fill="#fff" font-family="Helvetica Neue,sans-serif" font-size="18" font-weight="700" text-anchor="middle">Domain exists because knowledge is shared.</text>

  <!-- Bottom: contributor message -->
  <text x="400" y="620" fill="rgba(255,255,255,0.5)" font-family="Helvetica Neue,sans-serif" font-size="14" text-anchor="middle">Your contribution is Domain — shared knowledge.</text>
  <text x="400" y="650" fill="rgba(255,255,255,0.5)" font-family="Helvetica Neue,sans-serif" font-size="14" text-anchor="middle">You don't need to write Skills or code.</text>
  <text x="400" y="690" fill="rgba(255,255,255,0.35)" font-family="Helvetica Neue,sans-serif" font-size="12" text-anchor="middle">Write once in domain/ → multiple Skills inherit your expertise.</text>
</svg>
