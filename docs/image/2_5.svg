<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <rect width="800" height="800" fill="#000"/>
  <!-- Dividing line -->
  <line x1="400" y1="100" x2="400" y2="620" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>

  <!-- LEFT: Kitchen / MCP -->
  <text x="200" y="130" fill="rgba(255,255,255,0.4)" font-family="Helvetica Neue,sans-serif" font-size="14" letter-spacing="4" text-anchor="middle">KITCHEN</text>
  <!-- Stovetop -->
  <rect x="130" y="180" width="140" height="100" rx="8" fill="none" stroke="#fff" stroke-width="2"/>
  <circle cx="170" cy="220" r="18" fill="none" stroke="#fff" stroke-width="1.5"/>
  <circle cx="230" cy="220" r="18" fill="none" stroke="#fff" stroke-width="1.5"/>
  <circle cx="170" cy="256" r="12" fill="none" stroke="#fff" stroke-width="1.5"/>
  <circle cx="230" cy="256" r="12" fill="none" stroke="#fff" stroke-width="1.5"/>
  <!-- Tool icons below -->
  <line x1="155" y1="320" x2="175" y2="360" stroke="#fff" stroke-width="2"/>
  <line x1="195" y1="320" x2="195" y2="360" stroke="#fff" stroke-width="2"/>
  <circle cx="195" cy="366" r="6" fill="none" stroke="#fff" stroke-width="2"/>
  <rect x="222" y="320" width="20" height="40" rx="3" fill="none" stroke="#fff" stroke-width="2"/>
  <!-- Label -->
  <text x="200" y="430" fill="#fff" font-family="Helvetica Neue,sans-serif" font-size="36" font-weight="800" text-anchor="middle">MCP</text>
  <text x="200" y="465" fill="rgba(255,255,255,0.4)" font-family="Helvetica Neue,sans-serif" font-size="16" text-anchor="middle">provides ability</text>

  <!-- RIGHT: Recipe / SKILL -->
  <text x="600" y="130" fill="rgba(255,255,255,0.4)" font-family="Helvetica Neue,sans-serif" font-size="14" letter-spacing="4" text-anchor="middle">RECIPE</text>
  <!-- Recipe card -->
  <rect x="530" y="180" width="140" height="180" rx="8" fill="none" stroke="#fff" stroke-width="2"/>
  <text x="560" y="215" fill="rgba(255,255,255,0.6)" font-family="Helvetica Neue,sans-serif" font-size="14">1. ─────────</text>
  <text x="560" y="245" fill="rgba(255,255,255,0.6)" font-family="Helvetica Neue,sans-serif" font-size="14">2. ─────────</text>
  <text x="560" y="275" fill="rgba(255,255,255,0.6)" font-family="Helvetica Neue,sans-serif" font-size="14">3. ─────────</text>
  <text x="560" y="305" fill="rgba(255,255,255,0.6)" font-family="Helvetica Neue,sans-serif" font-size="14">4. ─────────</text>
  <text x="560" y="335" fill="rgba(255,255,255,0.6)" font-family="Helvetica Neue,sans-serif" font-size="14">5. ─────────</text>
  <!-- Label -->
  <text x="600" y="430" fill="#fff" font-family="Helvetica Neue,sans-serif" font-size="36" font-weight="800" text-anchor="middle">SKILL</text>
  <text x="600" y="465" fill="rgba(255,255,255,0.4)" font-family="Helvetica Neue,sans-serif" font-size="16" text-anchor="middle">provides knowledge</text>

  <!-- Bottom: combined result -->
  <line x1="200" y1="520" x2="350" y2="580" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
  <line x1="600" y1="520" x2="450" y2="580" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
  <text x="400" y="530" fill="rgba(255,255,255,0.3)" font-family="Helvetica Neue,sans-serif" font-size="28" text-anchor="middle">+</text>
  <!-- Result plate -->
  <circle cx="400" cy="620" r="35" fill="none" stroke="#fff" stroke-width="2"/>
  <text x="400" y="626" fill="#fff" font-family="Helvetica Neue,sans-serif" font-size="16" text-anchor="middle">RESULT</text>

  <!-- Citation -->
  <text x="400" y="730" fill="rgba(255,255,255,0.3)" font-family="Helvetica Neue,sans-serif" font-size="12" text-anchor="middle" font-style="italic">Anthropic: "Skills complement MCP servers by teaching agents</text>
  <text x="400" y="750" fill="rgba(255,255,255,0.3)" font-family="Helvetica Neue,sans-serif" font-size="12" text-anchor="middle" font-style="italic">more complex workflows that involve external tools."</text>
</svg>
